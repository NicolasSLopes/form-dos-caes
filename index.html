<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Doação</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <h2>Formulário de Doação</h2>
    
    <form id="formulario">
        
        <label>Nome completo:</label>
        <input type="text" id="nome" minlength="3" required pattern="[A-Za-zÀ-ÿ\s]+" >

        <label>Email:</label>
        <input type="email" id="email" required>

        <label>Telefone:</label>
        <input type="tel" id="telefone" required placeholder="Apenas Numeros">

        <label>CPF:</label>
        <input 
            type="text" 
            id="cpf" 
            placeholder="000.000.000-00"
            pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
            required
        >

        <label>Idade:</label>
        <input type="number" id="idade"  required>
     
        <label>Cidade:</label>
        <input type="text" id="cidade" required>

        <label>Tipo de moradia:</label>
          <select id="moradia" required>
                <option value="">Selecione</option>
                <option value="casa">Casa</option>
                <option value="apartamento">Apartamento</option>
            </select>
        
        <div id="apartamentoDiv" style="display: none;">
            <label>Permite animais?</label>
                <select id="permiteAnimais">
                    <option value="">Selecione</option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
        </div>

        <div id="casasDiv" style="display: none;">

            <label>Possui quintal:</label>
            <select id="possuiQuintal" required>
                <option value="">Selecione</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>

            <div id="quintalSeguroDiv" style="display: none;">
                <label>Quintal é seguro?:</label>
                <select id="quintalSeguro" required>
                    <option value="">Selecione</option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
            </div>
            
        </div>
        
        <label>Já teve pet antes:</label>
          <select id="pet" required>
                <option value="">Selecione</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>

        <label>Quantas horas o pet ficará sozinho:</label>
        <input type="number" id="hora" required>

        <label>Condição financeira</label>
        <select id="financeiro" required>
            <option value="">Selecione</option>
            <option value="">Boa</option>
            <option value="">Ruim</option>
        </select>

        <label>Quando decidiu adotar</label>
        <select id="decisao" required>
            <option value="">Selecione</option>
            <option value="hoje">Hoje</option>
            <option value="tempo">Faz tempo</option>
        </select>

        <label>Motivo:</label>
        <textarea id="mensagem" minlength="10" rows="4" cols="50" required placeholder="Min 10 caracteres" style="resize: none;"></textarea>

        <label>
            <input type="checkbox" id="termo" required>
            <p>Aceito os <a href="termos.html" target="_blank"></a> termos de responsabilidade</p>
        </label>


        <button type="submit">Enviar</button>

    </form>


    <script src="script.js"></script>
</body>
</html>
