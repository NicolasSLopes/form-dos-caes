<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <h2>Formulário</h2>

    <form id="formulario">
        
        <label for="nome">Nome completo:</label>
        <input type="text" id="nome" name="nome" minlength="3" required pattern="[A-Za-zÀ-ÿ\s]+" >

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone" required>

        <label for="cpf">CPF:</label>
        <input 
            type="text" 
            id="cpf" 
            name="cpf"
            placeholder="000.000.000-00"
            pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
            required
        >

        <label for="idade">Idade:</label>
        <input type="number" id="idade" name="idade" required>
     
        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" name="cidade" required>

        <label for="moradia">Tipo de moradia:</label>
          <select id="moradia" name="moradia" required>
                <option value="casa">Casa</option>
                <option value="apartamento">Apartamento</option>
            </select>
        
        <div>
            <label for="permiteAnimais" style="display: none;">
                <p>Permite animais?</p>
                <select name="permiteAnimais" id="permiteAnimais">
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
            </label>
        </div>

        <label for="quintal">Possui quintal:</label>
          <select id="text" name="quintal" required>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>

        <label for="pet">Já teve pet antes:</label>
          <select id="text" name="pet" required>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>

        <label for="hora">Quantas horas o pet ficará sozinho:</label>
        <input type="time" id="hora" name="hora" required>

        <label for="mensagem">Motivo:</label>
        <textarea id="mensagem" name="mensagem" minlength="10" rows="4" cols="50" required placeholder="Min 10 caracteres" style="resize: none;"></textarea>

        <label>
            <input type="checkbox" name="termo" id="termo" required>
            <p>Aceito os <a href="termos.html" target="_blank"></a> termos de responsabilidade</p>
        </label>


        <button type="submit">Enviar</button>

    </form>


    <script src="script.js"></script>
</body>
</html>
